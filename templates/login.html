<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFC Access Review — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: linear-gradient(135deg, #1a8a8f 0%, #1a237e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; border-radius: 14px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.35); }
    .login-title { font-size: 1.5rem; font-weight: 700; color: #1a8a8f; text-align: center; margin-bottom: 0.25rem; }
    .login-sub { text-align: center; color: #64748b; font-size: 0.88rem; margin-bottom: 1.75rem; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-control { border: 2px solid #e5e7eb; border-radius: 7px; padding: 0.7rem 0.9rem; font-size: 0.95rem; }
    .form-control:focus { border-color: #1a8a8f; box-shadow: 0 0 0 3px rgba(26,138,143,0.12); }
    .btn-login { background: #1a8a8f; color: white; border: none; width: 100%; padding: 0.85rem; border-radius: 7px; font-weight: 700; font-size: 1rem; transition: background 0.2s; }
    .btn-login:hover { background: #156b6f; color: white; }
    .alert-error { background: #fee2e2; color: #991b1b; border-radius: 7px; padding: 0.7rem 1rem; font-size: 0.88rem; margin-bottom: 1.25rem; border: 1px solid #fecaca; }
    .divider { border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
    img.logo { height: 48px; display: block; margin: 0 auto 1.25rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="/static/getsitelogo.png" alt="SCOR" class="logo" onerror="this.style.display='none'">
    <div class="login-title"><i class="bi bi-shield-lock me-2"></i>BFC Access Review</div>
    <div class="login-sub">BFC IFRS — Quarterly User Access Review</div>

    {% if error %}
    <div class="alert-error"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@scor.com" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
  </div>
</body>
</html>
